name: Build YAY Linux ISO

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install archiso and build dependencies
        run: |
          pacman -Syu --noconfirm archiso squashfs-tools erofs-utils

      - name: Update mirrorlist (pick a fast mirror)
        run: |
          echo "Server = https://geo.mirror.pkgbuild.com/\$repo/os/\$arch" \
            > /etc/pacman.d/mirrorlist

      - name: Build ISO
        run: |
          bash build.sh -o out -c work

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: yaylinux-iso
          path: out/*.iso
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: yaylinux-iso
          path: out/

      - name: Create release with ISO
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.iso
          generate_release_notes: true
